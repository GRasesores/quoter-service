<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cotizacion de Seguro de Auto - G&R NEXUS</title>
<style>
  :root {
    --navy: #0a1128;
    --navy2: #10182f;
    --gold: #c8a96e;
    --text: #eae6da;
    --muted: #9a97a0;
    --error: #e05252;
  }
  .logo { display: block; margin: 0 auto 20px; max-width: 140px; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Barlow Condensed', Arial, sans-serif;
    background: var(--navy);
    color: var(--text);
    padding: 24px 16px 80px;
  }
  .wrap { max-width: 520px; margin: 0 auto; }
  h1 {
    font-size: 26px;
    font-weight: 600;
    color: var(--gold);
    margin-bottom: 4px;
  }
  p.sub { color: var(--muted); margin-top: 0; margin-bottom: 24px; }
  label {
    display: block;
    font-size: 13px;
    color: var(--muted);
    margin: 16px 0 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  select, input {
    width: 100%;
    padding: 12px 14px;
    background: var(--navy2);
    border: 1px solid #2a3252;
    border-radius: 6px;
    color: var(--text);
    font-size: 15px;
  }
  select:disabled { opacity: 0.4; cursor: not-allowed; }
  button {
    width: 100%;
    margin-top: 28px;
    padding: 14px;
    background: var(--gold);
    color: var(--navy);
    border: none;
    border-radius: 6px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  #estado {
    margin-top: 20px;
    padding: 14px;
    border-radius: 6px;
    display: none;
    font-size: 14px;
    line-height: 1.5;
  }
  #estado.cargando { display: block; background: #1b2444; color: var(--text); }
  #estado.error { display: block; background: rgba(224,82,82,0.15); color: var(--error); border: 1px solid var(--error); }
  #estado.exito { display: block; background: rgba(200,169,110,0.12); color: var(--gold); border: 1px solid var(--gold); }
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid var(--muted);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: girar 0.8s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }
  @keyframes girar { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="wrap">
  <img src="/logo.png" alt="Maps Seguros" class="logo">
  <h1>Cotizacion de Seguro de Auto</h1>
  <p class="sub">Llena tus datos y los de tu vehiculo</p>
  <p class="sub" style="font-size:13px">La primera vez que se elige una marca/modelo puede tardar hasta 30 segundos en cargar (las siguientes veces es instantaneo).</p>

  <form id="form-cotizacion">
    <label>Tipo de Transporte</label>
    <select id="tipoTransporte" required>
      <option value="Automóvil">Automóvil</option>
      <option value="Camión">Camión</option>
      <option value="Motocicleta">Motocicleta</option>
    </select>

    <label>Marca <span class="spinner" id="spinner-marca" style="display:none"></span></label>
    <select id="marca" required><option value="">Cargando marcas...</option></select>

    <label>Submarca (Modelo) <span class="spinner" id="spinner-submarca" style="display:none"></span></label>
    <select id="submarca" disabled required><option value="">Selecciona una marca primero</option></select>

    <label>Año <span class="spinner" id="spinner-anio" style="display:none"></span></label>
    <select id="anio" disabled required><option value="">Selecciona una submarca primero</option></select>

    <label>Version <span class="spinner" id="spinner-version" style="display:none"></span></label>
    <select id="version" disabled required><option value="">Selecciona un año primero</option></select>

    <label>Uso</label>
    <select id="uso" required></select>

    <label>Servicio <span class="spinner" id="spinner-servicio" style="display:none"></span></label>
    <select id="servicio" disabled required><option value="">Selecciona un uso primero</option></select>

    <label>Tipo de Poliza</label>
    <select id="tipoPoliza" required>
      <option value="RC">RC</option>
      <option value="LIMITADA">Limitada</option>
      <option value="AMPLIA">Amplia</option>
    </select>

    <label>Nombre completo</label>
    <input type="text" id="nombreCompleto" required>

    <label>Codigo postal</label>
    <input type="text" id="codigoPostal" required>

    <label>Telefono WhatsApp</label>
    <input type="tel" id="telefono" required>

    <label>Correo electronico</label>
    <input type="email" id="correo" required>

    <button type="submit" id="btn-submit">Cotizar</button>
  </form>

  <div id="estado"></div>
</div>

<script>
const USOS = [
  "PARTICULAR","EXCLUSIVO UBER","EXCLUSIVO DIDI","CONDUCTOR APP","EXTENSION APP",
  "INDRIVER","BOLT","MIXTO","TAXI","MOTOTAXI","CARGA A y B PESADO","CARGA C",
  "CARGA LIGERA","REPARTO","REPARTO APP","AUTO ESCUELA","EMERGENCIAS",
  "GASTOS FUNERARIOS","GASTOS MEDICOS","GRUA","INYECCION DE PRIMA",
  "RC OBLIGATORIA","RENTA DIARIA","SEGURO AUTOPISTA","SEGURO DE VIDA",
  "TRANSFER","TRANSPORTE DE PERSONAL","TRANSPORTE ESCOLAR",
  "TRANSPORTE PUBLICO","TRANSPORTE TURISMO"
];

const $ = (id) => document.getElementById(id);
const estado = $("estado");

function llenarSelect(select, opciones, placeholder) {
  select.innerHTML = "";
  const optVacia = document.createElement("option");
  optVacia.value = "";
  optVacia.textContent = placeholder;
  select.appendChild(optVacia);
  opciones.forEach((op) => {
    const o = document.createElement("option");
    o.value = op;
    o.textContent = op;
    select.appendChild(o);
  });
}

function resetear(select, placeholder) {
  select.innerHTML = `<option value="">${placeholder}</option>`;
  select.disabled = true;
}

// Uso: lista estatica, no depende de Maps Seguros en vivo
llenarSelect($("uso"), USOS, "Selecciona una opcion");

function mostrarSpinner(id, mostrar) {
  const el = document.getElementById(`spinner-${id}`);
  if (el) el.style.display = mostrar ? "inline-block" : "none";
}

function cargarServicios() {
  const tipoTransporte = $("tipoTransporte").value;
  const uso = $("uso").value;
  resetear($("servicio"), "Selecciona un uso primero");
  if (!uso) return;
  $("servicio").innerHTML = `<option value="">Cargando servicios...</option>`;
  mostrarSpinner("servicio", true);
  fetch(`/catalogo/servicios?tipoTransporte=${encodeURIComponent(tipoTransporte)}&uso=${encodeURIComponent(uso)}`)
    .then((r) => r.json())
    .then((data) => {
      if (!data.ok) throw new Error(data.error || "No se pudieron cargar los servicios");
      llenarSelect($("servicio"), data.servicios, "Selecciona un servicio");
      $("servicio").disabled = false;
    })
    .catch((e) => {
      $("servicio").innerHTML = `<option value="">Error: ${e.message}</option>`;
    })
    .finally(() => mostrarSpinner("servicio", false));
}
$("uso").addEventListener("change", cargarServicios);

function cargarMarcas() {
  const tipoTransporte = $("tipoTransporte").value;
  resetear($("submarca"), "Selecciona una marca primero");
  resetear($("anio"), "Selecciona una submarca primero");
  resetear($("version"), "Selecciona un año primero");
  $("marca").innerHTML = `<option value="">Cargando marcas...</option>`;
  mostrarSpinner("marca", true);
  fetch(`/catalogo/marcas?tipoTransporte=${encodeURIComponent(tipoTransporte)}`)
    .then((r) => r.json())
    .then((data) => {
      if (!data.ok) throw new Error(data.error || "No se pudieron cargar las marcas");
      llenarSelect($("marca"), data.marcas, "Selecciona una marca");
    })
    .catch((e) => {
      $("marca").innerHTML = `<option value="">Error: ${e.message}</option>`;
    })
    .finally(() => mostrarSpinner("marca", false));
}

// Carga inicial de marcas (con el Tipo de Transporte por default: Automóvil)
cargarMarcas();
$("tipoTransporte").addEventListener("change", cargarMarcas);

$("marca").addEventListener("change", () => {
  const tipoTransporte = $("tipoTransporte").value;
  const marca = $("marca").value;
  resetear($("submarca"), "Cargando...");
  resetear($("anio"), "Selecciona una submarca primero");
  resetear($("version"), "Selecciona un año primero");
  if (!marca) return;
  mostrarSpinner("submarca", true);
  fetch(`/catalogo/submarcas?marca=${encodeURIComponent(marca)}&tipoTransporte=${encodeURIComponent(tipoTransporte)}`)
    .then((r) => r.json())
    .then((data) => {
      if (!data.ok) throw new Error(data.error);
      llenarSelect($("submarca"), data.submarcas, "Selecciona una submarca");
      $("submarca").disabled = false;
    })
    .catch((e) => {
      $("submarca").innerHTML = `<option value="">Error: ${e.message}</option>`;
    })
    .finally(() => mostrarSpinner("submarca", false));
});

$("submarca").addEventListener("change", () => {
  const tipoTransporte = $("tipoTransporte").value;
  const marca = $("marca").value;
  const submarca = $("submarca").value;
  resetear($("anio"), "Cargando...");
  resetear($("version"), "Selecciona un año primero");
  if (!submarca) return;
  mostrarSpinner("anio", true);
  fetch(`/catalogo/anios?marca=${encodeURIComponent(marca)}&submarca=${encodeURIComponent(submarca)}&tipoTransporte=${encodeURIComponent(tipoTransporte)}`)
    .then((r) => r.json())
    .then((data) => {
      if (!data.ok) throw new Error(data.error);
      llenarSelect($("anio"), data.anios, "Selecciona un año");
      $("anio").disabled = false;
    })
    .catch((e) => {
      $("anio").innerHTML = `<option value="">Error: ${e.message}</option>`;
    })
    .finally(() => mostrarSpinner("anio", false));
});

$("anio").addEventListener("change", () => {
  const tipoTransporte = $("tipoTransporte").value;
  const marca = $("marca").value;
  const submarca = $("submarca").value;
  const anio = $("anio").value;
  resetear($("version"), "Cargando...");
  if (!anio) return;
  mostrarSpinner("version", true);
  fetch(`/catalogo/versiones?marca=${encodeURIComponent(marca)}&submarca=${encodeURIComponent(submarca)}&anio=${encodeURIComponent(anio)}&tipoTransporte=${encodeURIComponent(tipoTransporte)}`)
    .then((r) => r.json())
    .then((data) => {
      if (!data.ok) throw new Error(data.error);
      if (!data.versiones || data.versiones.length === 0) {
        // Esta submarca no tiene versiones cargadas en Maps Seguros —
        // dejamos avanzar sin bloquear el formulario
        $("version").innerHTML = `<option value="">Sin versiones disponibles (puedes continuar)</option>`;
        $("version").disabled = false;
        $("version").required = false;
        return;
      }
      llenarSelect($("version"), data.versiones, "Selecciona una version");
      $("version").disabled = false;
      $("version").required = true;
    })
    .catch((e) => {
      $("version").innerHTML = `<option value="">Error: ${e.message}</option>`;
    })
    .finally(() => mostrarSpinner("version", false));
});

$("form-cotizacion").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = $("btn-submit");
  btn.disabled = true;
  estado.className = "cargando";
  estado.innerHTML = '<span class="spinner"></span>Cotizando en Maps Seguros y generando tu PDF, esto puede tardar hasta 2 minutos...';

  const payload = {
    tipoTransporte: $("tipoTransporte").value,
    marca: $("marca").value,
    modelo: $("submarca").value,
    anio: $("anio").value,
    version: $("version").value,
    uso: $("uso").value,
    servicio: $("servicio").value,
    tipoPoliza: $("tipoPoliza").value,
    nombreCompleto: $("nombreCompleto").value,
    codigoPostal: $("codigoPostal").value,
    telefono: $("telefono").value,
    correo: $("correo").value,
  };

  try {
    const res = await fetch("/enviar-cotizacion", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    const datos = await res.json();
    if (!datos.ok) {
      const motivo = datos.error || datos.message || `Error ${res.status}`;
      throw new Error(`${motivo} (revisa que el workflow de n8n esté Activo)`);
    }

    const anual = datos.Anual || datos.anual || (datos.resultado && datos.resultado.anual) || null;
    const pdfUrl = datos.pdfUrl || (datos.resultado && datos.resultado.pdfUrl) || null;
    const numeroAsesor = "527141084886"; // 52 = México, agrega tu número real aquí
    const mensajeWhatsapp = encodeURIComponent(
      `Hola, quiero contratar la poliza de mi ${payload.marca} ${payload.modelo} ${payload.anio} y me gustaria recibir el link de pago.`
    );
    const linkWhatsapp = `https://wa.me/${numeroAsesor}?text=${mensajeWhatsapp}`;

    const idCotizacion = pdfUrl ? (pdfUrl.match(/\d+/) || [])[0] : String(Date.now());

    estado.className = "exito";
    estado.innerHTML = `
      <div><strong>Cotizacion lista</strong></div>
      <div style="margin:10px 0">
        ${payload.marca} ${payload.modelo} ${payload.anio} — ${payload.tipoPoliza}<br>
        ${anual ? `Total anual: <strong>$${anual}</strong>` : "Revisa el detalle con tu asesor"}
      </div>
      ${pdfUrl ? `<a href="${pdfUrl}" download="cotizacion.pdf" id="link-pdf" style="display:block;text-align:center;background:var(--gold);color:var(--navy);padding:12px;border-radius:6px;text-decoration:none;font-weight:600;margin-bottom:4px">Descargar PDF de la cotizacion</a>
      <p style="text-align:center;font-size:12px;color:var(--muted);margin:0 0 16px">Se descarga a tu dispositivo, esta pantalla sigue abierta</p>` : ""}
      <div id="panel-decision">
        <p style="text-align:center;margin-bottom:10px">¿Deseas continuar con la contratacion?</p>
        <div style="display:flex;gap:10px">
          <button type="button" id="btn-si" style="flex:1;padding:12px;background:var(--gold);color:var(--navy);border:none;border-radius:6px;font-weight:600;cursor:pointer">Si, continuar</button>
          <button type="button" id="btn-no" style="flex:1;padding:12px;background:transparent;color:var(--text);border:1px solid var(--muted);border-radius:6px;font-weight:600;cursor:pointer">No por ahora</button>
        </div>
      </div>
    `;

    if (pdfUrl) {
      const linkPdf = document.getElementById("link-pdf");
      linkPdf.addEventListener("click", () => {
        fetch("/notificar-descarga", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            nombreCompleto: payload.nombreCompleto,
            telefono: payload.telefono,
            marca: payload.marca,
            modelo: payload.modelo,
            anio: payload.anio,
          }),
        }).catch(() => {});
      });
    }

    async function enviarDecision(decision, canal) {
      try {
        const res = await fetch("/enviar-interes", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            idCotizacion, decision, canal,
            nombreCompleto: payload.nombreCompleto,
            telefono: payload.telefono,
            marca: payload.marca,
            modelo: payload.modelo,
            anio: payload.anio,
            pdfUrl,
          }),
        });
        const datos = await res.json();
        const panel = document.getElementById("panel-decision");
        const htmlWhatsapp = `<a href="${linkWhatsapp}" target="_blank" style="display:block;text-align:center;background:#25D366;color:#fff;padding:12px;border-radius:6px;text-decoration:none;font-weight:600;margin-top:10px">Contactar por WhatsApp</a>`;
        if (datos.ok && datos.siguientePaso) {
          panel.innerHTML = `<p style="text-align:center">${datos.mensaje}</p>
            <a href="${datos.siguientePaso}" style="display:block;text-align:center;background:var(--gold);color:var(--navy);padding:12px;border-radius:6px;text-decoration:none;font-weight:600">Subir mis documentos</a>`;
        } else {
          panel.innerHTML = `<p style="text-align:center">${(datos && datos.mensaje) || "Listo."}</p>${htmlWhatsapp}`;
        }
      } catch (e) {
        document.getElementById("panel-decision").innerHTML = `<p style="text-align:center;color:var(--error)">Error: ${e.message}</p>`;
      }
    }

    document.getElementById("btn-si").addEventListener("click", () => {
      const panel = document.getElementById("panel-decision");
      panel.innerHTML = `
        <p style="text-align:center;margin-bottom:10px">¿Como prefieres continuar?</p>
        <div style="display:flex;gap:10px">
          <button type="button" id="btn-mensajes" style="flex:1;padding:12px;background:var(--gold);color:var(--navy);border:none;border-radius:6px;font-weight:600;cursor:pointer">Todo por mensajes</button>
          <button type="button" id="btn-asesor" style="flex:1;padding:12px;background:transparent;color:var(--text);border:1px solid var(--muted);border-radius:6px;font-weight:600;cursor:pointer">Contactar asesor</button>
        </div>
      `;
      document.getElementById("btn-mensajes").addEventListener("click", () => enviarDecision("si", "mensajes"));
      document.getElementById("btn-asesor").addEventListener("click", () => enviarDecision("si", "asesor"));
    });

    document.getElementById("btn-no").addEventListener("click", () => enviarDecision("no", ""));
  } catch (err) {
    estado.className = "error";
    estado.textContent = "Error: " + err.message;
  } finally {
    btn.disabled = false;
  }
});
</script>
</body>
</html>
